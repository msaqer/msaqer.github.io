<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="260" viewBox="0 0 1100 260">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #333333; stroke-width: 2; rx: 14; ry: 14; }
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #111; }
      .desc { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
      .arrow { stroke: #333333; stroke-width: 2.5; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 Z" fill="#333333"/>
    </marker>
  </defs>

  <rect class="box" x="30" y="60" width="190" height="140"/>
  <text class="title" x="125" y="105" text-anchor="middle">Collect</text>
  <text class="desc" x="125" y="135" text-anchor="middle">Incident queries</text>
  <text class="desc" x="125" y="155" text-anchor="middle">Time windows</text>

  <rect class="box" x="250" y="60" width="190" height="140"/>
  <text class="title" x="345" y="105" text-anchor="middle">Clean</text>
  <text class="desc" x="345" y="135" text-anchor="middle">Deduplicate</text>
  <text class="desc" x="345" y="155" text-anchor="middle">Noise filtering</text>

  <rect class="box" x="470" y="60" width="210" height="140"/>
  <text class="title" x="575" y="105" text-anchor="middle">Engineer Features</text>
  <text class="desc" x="575" y="135" text-anchor="middle">Security-aware terms</text>
  <text class="desc" x="575" y="155" text-anchor="middle">Signals &amp; composites</text>

  <rect class="box" x="710" y="60" width="170" height="140"/>
  <text class="title" x="795" y="105" text-anchor="middle">Score</text>
  <text class="desc" x="795" y="135" text-anchor="middle">Relevance</text>
  <text class="desc" x="795" y="155" text-anchor="middle">Calibration</text>

  <rect class="box" x="910" y="60" width="160" height="140"/>
  <text class="title" x="990" y="105" text-anchor="middle">Prioritize</text>
  <text class="desc" x="990" y="135" text-anchor="middle">Label / triage</text>
  <text class="desc" x="990" y="155" text-anchor="middle">Analyst-ready</text>

  <line class="arrow" x1="220" y1="130" x2="250" y2="130"/>
  <line class="arrow" x1="440" y1="130" x2="470" y2="130"/>
  <line class="arrow" x1="680" y1="130" x2="710" y2="130"/>
  <line class="arrow" x1="880" y1="130" x2="910" y2="130"/>

  <text class="desc" x="550" y="30" text-anchor="middle">CTGL pipeline diagram (placeholder) — replace with final system figure later</text>
</svg>
